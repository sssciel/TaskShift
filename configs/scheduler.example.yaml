# Example scheduler settings for TaskShift.
# Copy this file to `configs/scheduler.yaml` and adjust it for the target environment.

# Maximum allowed job time limit, in minutes. Jobs above this limit are skipped.
timelimit: 600

# Maximum number of jobs that may be launched in one scheduler pass.
max_launched_jobs: 10

# Enables forecast-aware scheduling without extra CLI flags.
forecast_enabled: false

# Where trained forecast artifacts are stored.
forecast_model_dir: artifacts/forecast_model

# Maximum age of the forecast artifact before TaskShift retrains it automatically.
# Default 84h means roughly twice a week.
forecast_model_update_interval_hours: 84

# Future forecast horizon stored with each trained model artifact.
# Each point predicts mean GPU load for the next 6 hours.
forecast_prediction_horizon_hours: 72

# IANA timezone used for scheduler timers and wall-clock scheduling.
timezone: Europe/Moscow

# Fixed daily time for live cluster config refresh.
cluster_config_refresh_time: "00:30"

# Starts the admin web panel together with `taskshift schedule`.
web_panel_enabled: true

# Enables background hot reload for safe scheduler settings from this file.
hot_reload_enabled: false

# Command that prints the current Slurm config to stdout.
# Place the Slurm config snapshot at `configs/slurm.conf`, or replace this with an SSH command
# if the scheduler runs outside the Slurm control host.
cluster_config_refresh_command:
  - cat
  - configs/slurm.conf


# SLURM connector settings - how the scheduler asks mserver to change job QoS.
connector:
  # External mserver endpoint. TaskShift sends POST requests with:
  # {"jobs": [JOB_ID], "qos": "QOS_NAME"}
  mserver_url: http://mserver.local:930/slurm_set_job_qos

  # HTTP request timeout in seconds.
  timeout_seconds: 30

  # QoS name sent to mserver.
  target_qos: taskshift
