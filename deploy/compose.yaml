services:
  taskshift:
    image: taskshift
    container_name: taskshift-server
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    env_file:
      - path: ../configs/.env
        required: false
    environment:
      TASKSHIFT_SERVER_HOST: 0.0.0.0
      TASKSHIFT_SERVER_PORT: "8000"
    ports:
      - "${TASKSHIFT_WEB_PORT:-8000}:8000"
    volumes:
      - taskshift-config:/app/configs
      - taskshift-logs:/app/logs
      - taskshift-exports:/app/exports

volumes:
  taskshift-config:
  taskshift-logs:
  taskshift-exports:
