services:
  mariadb:
    image: mariadb:11.4
    environment:
      MARIADB_DATABASE: slurm_acct_db
      MARIADB_USER: taskshift
      MARIADB_PASSWORD: taskshift
      MARIADB_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - ./docker/mariadb-init:/docker-entrypoint-initdb.d:ro

  taskshift-tests:
    build:
      context: ../..
      dockerfile: tests/integration/Dockerfile.e2e
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: taskshift
      DB_PASSWD: taskshift
      DB_DATABASE: slurm_acct_db
      DB_CHARSET: utf8mb4
      DB_COLLATION: utf8mb4_general_ci
      PYTHONPATH: /workspace/src:/workspace/tests
    working_dir: /workspace
    command: ["pytest", "tests/integration", "-v", "--tb=short", "--maxfail=5"]
